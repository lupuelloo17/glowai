<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="Veloura — La plataforma inteligente para clínicas estéticas">
  <defs>
    <linearGradient id="vw-gold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#D4B17C"/>
      <stop offset="50%"  stop-color="#C9A46A"/>
      <stop offset="100%" stop-color="#A88451"/>
    </linearGradient>
  </defs>

  <!-- Isotipo a la izquierda (mismo símbolo: diamante + dos pétalos) -->
  <g transform="translate(20 20) scale(0.65)">
    <!-- Diamante superior -->
    <path d="M 100 12 L 118 38 L 100 64 L 82 38 Z" fill="url(#vw-gold)"/>
    <!-- Pétalo izquierdo -->
    <path
      d="M 100 80 C 95 82, 88 87, 78 100
         C 60 122, 45 150, 38 180
         C 35 195, 38 210, 50 220
         C 62 226, 78 222, 92 208
         C 100 200, 100 188, 100 172 L 100 80 Z"
      fill="url(#vw-gold)"
    />
    <!-- Pétalo derecho -->
    <path
      d="M 100 80 C 105 82, 112 87, 122 100
         C 140 122, 155 150, 162 180
         C 165 195, 162 210, 150 220
         C 138 226, 122 222, 108 208
         C 100 200, 100 188, 100 172 L 100 80 Z"
      fill="url(#vw-gold)"
    />
  </g>

  <!-- Wordmark "VELOURA" en sans-serif geométrico moderno -->
  <text
    x="195" y="125"
    font-family="'Inter', 'DM Sans', 'Helvetica Neue', system-ui, sans-serif"
    font-weight="700"
    font-size="90"
    letter-spacing="4"
    fill="#2D2A26"
  >VELOURA</text>
</svg>
